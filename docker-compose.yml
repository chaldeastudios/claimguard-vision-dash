services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  db:
    image: ghcr.io/openimis/openimis-pgsql:develop
    container_name: openimis-db
    restart: always
    shm_size: 256mb
    environment:
      - POSTGRES_DB=openimis
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgrespassword
      - DEMO_DATASET=true
    volumes:
      - openimis_db_data:/var/lib/postgresql/data
      - ./demo-data:/demo-data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - openimis-net

  # ---------------------------------------------------------------------------
  # RabbitMQ — Celery broker
  # ---------------------------------------------------------------------------
  # openIMIS mutations (createInsuree, updateFamily, ...) don't apply
  # synchronously in the request/response cycle -- they enqueue a Celery task
  # and return immediately with just a clientMutationId. The actual write
  # (and any validation/permission error) only happens once a `worker`
  # service (below) picks the task up off this broker. Without a broker at
  # all, the enqueue itself fails (backend logs:
  # `kombu.exceptions.OperationalError: [Errno -2] Name or service not
  # known`, since CELERY_BROKER_URL points at a "rabbitmq" host that doesn't
  # exist) -- so mutations silently never apply, while still returning a
  # success-shaped GraphQL response. Matches the official reference compose
  # (github.com/openimis/openimis-dist_dkr).
  rabbitmq:
    image: rabbitmq:3-management
    container_name: openimis-rabbitmq
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - openimis-net

  # ---------------------------------------------------------------------------
  # openIMIS Django Backend — one-shot migration/fixture step
  # ---------------------------------------------------------------------------
  # `start` (below) only launches the web server — it never runs migrations.
  # That's a separate `init` subcommand in the image's entrypoint (migrate +
  # load_fixtures, then exits). Without this, every query against a fresh db
  # fails with `relation "core_ModuleConfiguration" does not exist`.
  backend-init:
    build:
      context: .
      dockerfile: railway/backend.Dockerfile
    container_name: openimis-backend-init
    command: init
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=openimis
      - DB_USER=postgres
      - DB_PASSWORD=postgrespassword
      - DB_HOST=db
      - DB_PORT=5432
      - DEBUG=True
      # core.schema._check_csrf_token enforces a session-based CSRF check
      # (request.session['csrftoken'] must match an X-CSRFTOKEN header) on
      # every GraphQL operation -- that check assumes a browser session
      # cookie, which a stateless JWT/bearer API client (like the
      # ClaimGuard dashboard's server-side GraphQL client) never
      # establishes, so it fails with a KeyError on request.session before
      # ever comparing tokens. USER_AGENT_CSRF_BYPASS (settings/security.py)
      # is the surgical fix for that: it only affects _check_csrf_token,
      # matched by substring against our client's own User-Agent header
      # (openimis.server.ts sends "ClaimGuard-Dashboard"). An earlier
      # attempt at MODE=dev for this same problem was reverted because
      # openIMIS/settings/dev.py never set ALLOWED_HOSTS from env, breaking
      # it -- we're trying MODE=Dev again below per the hackathon admins'
      # fix, with ALLOWED_HOSTS still forced below as a hedge in case that's
      # still true; revert MODE=Dev first if login/API access breaks.
      - USER_AGENT_CSRF_BYPASS=ClaimGuard-Dashboard
      - SECRET_KEY=django-insecure-claimguard-openimis-integration-key-100%
      - ALLOWED_HOSTS=*
      # Switches openIMIS to its dev settings module. Per the hackathon
      # admins' fix doc: production mode sets JWT_COOKIE_SECURE=True, which
      # makes the browser silently refuse to send the auth cookie back over
      # plain HTTP -- looks exactly like sessions expiring almost
      # immediately. JWT_COOKIE_SECURE=False below is the direct fix for
      # that; MODE=Dev is redundant with it but included since that's what
      # was recommended.
      - MODE=Dev
      - JWT_COOKIE_SECURE=False
      - OPENIMIS_MODULES_CONFIG=/app/openimis.json
      # The openimis-fe frontend's bundled nginx forwards requests unchanged
      # to whatever path it received (no prefix stripping) — it always calls
      # ${REACT_APP_API_URL}/graphql, i.e. "api/graphql" by default. Django's
      # own urls.py builds its routes as "%sgraphql" % SITE_ROOT(), so this
      # tells Django to register at "api/graphql" to match what the frontend
      # actually requests, instead of bare "/graphql".
      - SITE_ROOT=api/
    volumes:
      - ./openimis.json:/app/openimis.json
      - ./openimis-be-fraud_py:/opt/openimis/openimis-be-fraud_py
    networks:
      - openimis-net

  # ---------------------------------------------------------------------------
  # openIMIS Django Backend
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: railway/backend.Dockerfile
    container_name: openimis-backend
    restart: always
    command: start
    ports:
      - "8000:8000"
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=openimis
      - DB_USER=postgres
      - DB_PASSWORD=postgrespassword
      - DB_HOST=db
      - DB_PORT=5432
      - DEBUG=True
      # core.schema._check_csrf_token enforces a session-based CSRF check
      # (request.session['csrftoken'] must match an X-CSRFTOKEN header) on
      # every GraphQL operation -- that check assumes a browser session
      # cookie, which a stateless JWT/bearer API client (like the
      # ClaimGuard dashboard's server-side GraphQL client) never
      # establishes, so it fails with a KeyError on request.session before
      # ever comparing tokens. USER_AGENT_CSRF_BYPASS (settings/security.py)
      # is the surgical fix for that: it only affects _check_csrf_token,
      # matched by substring against our client's own User-Agent header
      # (openimis.server.ts sends "ClaimGuard-Dashboard"). An earlier
      # attempt at MODE=dev for this same problem was reverted because
      # openIMIS/settings/dev.py never set ALLOWED_HOSTS from env, breaking
      # it -- we're trying MODE=Dev again below per the hackathon admins'
      # fix, with ALLOWED_HOSTS still forced below as a hedge in case that's
      # still true; revert MODE=Dev first if login/API access breaks.
      - USER_AGENT_CSRF_BYPASS=ClaimGuard-Dashboard
      - SECRET_KEY=django-insecure-claimguard-openimis-integration-key-100%
      - ALLOWED_HOSTS=*
      # Switches openIMIS to its dev settings module. Per the hackathon
      # admins' fix doc: production mode sets JWT_COOKIE_SECURE=True, which
      # makes the browser silently refuse to send the auth cookie back over
      # plain HTTP -- looks exactly like sessions expiring almost
      # immediately. JWT_COOKIE_SECURE=False below is the direct fix for
      # that; MODE=Dev is redundant with it but included since that's what
      # was recommended.
      - MODE=Dev
      - JWT_COOKIE_SECURE=False
      - OPENIMIS_MODULES_CONFIG=/app/openimis.json
      # The openimis-fe frontend's bundled nginx forwards requests unchanged
      # to whatever path it received (no prefix stripping) — it always calls
      # ${REACT_APP_API_URL}/graphql, i.e. "api/graphql" by default. Django's
      # own urls.py builds its routes as "%sgraphql" % SITE_ROOT(), so this
      # tells Django to register at "api/graphql" to match what the frontend
      # actually requests, instead of bare "/graphql".
      - SITE_ROOT=api/
      - SUPABASE_URL=${VITE_SUPABASE_URL}
      # Must be the service_role key, not the anon/publishable one -- RLS
      # only allows authenticated reads/writes, and this backend writes
      # server-to-server with no authenticated session, so anon writes get
      # silently rejected (caught by services.py's try/except, logged as a
      # warning, sync just never happens -- easy to miss).
      - SUPABASE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      # See the rabbitmq service comment above -- without this (and without
      # a worker actually consuming it), every mutation enqueues and never
      # applies.
      - CELERY_BROKER_URL=amqp://rabbitmq
    depends_on:
      backend-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./openimis.json:/app/openimis.json
      - ./openimis-be-fraud_py:/opt/openimis/openimis-be-fraud_py
    networks:
      - openimis-net

  # ---------------------------------------------------------------------------
  # openIMIS Celery Worker — actually processes the mutations backend enqueues
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: railway/backend.Dockerfile
    container_name: openimis-worker
    restart: always
    command: worker
    depends_on:
      backend-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=openimis
      - DB_USER=postgres
      - DB_PASSWORD=postgrespassword
      - DB_HOST=db
      - DB_PORT=5432
      - DEBUG=True
      - USER_AGENT_CSRF_BYPASS=ClaimGuard-Dashboard
      - SECRET_KEY=django-insecure-claimguard-openimis-integration-key-100%
      - ALLOWED_HOSTS=*
      - MODE=Dev
      - JWT_COOKIE_SECURE=False
      - OPENIMIS_MODULES_CONFIG=/app/openimis.json
      - SITE_ROOT=api/
      - SUPABASE_URL=${VITE_SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - CELERY_BROKER_URL=amqp://rabbitmq
    volumes:
      - ./openimis.json:/app/openimis.json
      - ./openimis-be-fraud_py:/opt/openimis/openimis-be-fraud_py
    networks:
      - openimis-net

  # ---------------------------------------------------------------------------
  # openIMIS React Frontend
  # ---------------------------------------------------------------------------
  frontend:
    image: ghcr.io/openimis/openimis-fe:develop
    container_name: openimis-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"
      # The image bakes in a self-signed cert and always redirects / to
      # https://<host>/front/ — it isn't built to be served plain-HTTP behind
      # a reverse proxy. Publish its HTTPS port directly (as the real,
      # default 443 — its own generated redirects target the default HTTPS
      # port and drop any custom port number, so a non-standard host port
      # like 8443 breaks its own redirect). Accept the self-signed cert
      # warning once in the browser.
      - "443:443"
    environment:
      - BACKEND_URL=http://backend:8000
      - PORT=80
      - OPENSEARCH_BASIC_TOKEN=dummy
    networks:
      - openimis-net

  # ---------------------------------------------------------------------------
  # ClaimGuard Vision Dashboard
  # ---------------------------------------------------------------------------
  claimguard-dash:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claimguard-dashboard
    restart: always
    env_file:
      - .env
    ports:
      - "5173:5173"
    environment:
      - PORT=5173
      # Server-side only (src/lib/openimis.server.ts) -- the dashboard's
      # "Claims Queue" fetches live claim data from openIMIS's own GraphQL
      # API over the internal Docker network rather than duplicating claims
      # into Supabase. SITE_ROOT=api/ on the backend service (above)
      # registers GraphQL at /api/graphql, matching this URL.
      - OPENIMIS_GRAPHQL_URL=http://backend:8000/api/graphql
      - OPENIMIS_USERNAME=${OPENIMIS_USERNAME}
      - OPENIMIS_PASSWORD=${OPENIMIS_PASSWORD}
    depends_on:
      - backend
    networks:
      - openimis-net

  # ---------------------------------------------------------------------------
  # Nginx API Gateway
  # ---------------------------------------------------------------------------
  gateway:
    image: nginx:alpine
    container_name: openimis-gateway
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
      - claimguard-dash
    networks:
      - openimis-net

# =============================================================================
# Volumes
# =============================================================================
volumes:
  openimis_db_data:

# =============================================================================
# Networks
# =============================================================================
networks:
  openimis-net:
    driver: bridge

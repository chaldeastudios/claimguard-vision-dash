version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: openimis-db
    restart: always
    shm_size: 256mb
    environment:
      POSTGRES_DB: openimis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    volumes:
      - openimis_db_data:/var/lib/postgresql/data
      - ./demo-data:/demo-data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openimis"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - openimis-net

  # ---------------------------------------------------------------------------
  # openIMIS Django Backend
  # ---------------------------------------------------------------------------
  backend:
    image: openimis/openimis_be:latest
    container_name: openimis-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=openimis
      - DB_USER=postgres
      - DB_PASSWORD=postgrespassword
      - DB_HOST=db
      - DB_PORT=5432
      - DEBUG=True
      - SECRET_KEY=django-insecure-claimguard-openimis-integration-key-100%
      - ALLOWED_HOSTS=*
      - OPENIMIS_MODULES_CONFIG=/app/openimis.json
      - SUPABASE_URL=${VITE_SUPABASE_URL}
      - SUPABASE_KEY=${VITE_SUPABASE_PUBLISHABLE_KEY}
    volumes:
      - ./openimis.json:/app/openimis.json
      - ./openimis-be-fraud_py:/opt/openimis/openimis-be-fraud_py
    networks:
      - openimis-net

  # ---------------------------------------------------------------------------
  # openIMIS React Frontend
  # ---------------------------------------------------------------------------
  frontend:
    image: openimis/openimis_fe:latest
    container_name: openimis-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - PORT=3000
    networks:
      - openimis-net

  # ---------------------------------------------------------------------------
  # ClaimGuard Vision Dashboard
  # ---------------------------------------------------------------------------
  claimguard-dash:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claimguard-dashboard
    restart: always
    env_file:
      - .env
    ports:
      - "5173:5173"
    environment:
      - PORT=5173
    depends_on:
      - backend
    networks:
      - openimis-net

  # ---------------------------------------------------------------------------
  # Nginx API Gateway
  # ---------------------------------------------------------------------------
  gateway:
    image: nginx:alpine
    container_name: openimis-gateway
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
      - claimguard-dash
    networks:
      - openimis-net

# =============================================================================
# Volumes
# =============================================================================
volumes:
  openimis_db_data:

# =============================================================================
# Networks
# =============================================================================
networks:
  openimis-net:
    driver: bridge

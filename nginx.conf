# =============================================================================
# ClaimGuard Gateway — Nginx Reverse Proxy
# =============================================================================
# Routes:
#   /api/         → openIMIS backend  (http://backend:8000)
#   /graphql      → openIMIS backend  (http://backend:8000)
#   /claimguard/  → ClaimGuard dash   (http://claimguard-dash:5173)
#   /             → openIMIS frontend (http://frontend:3000)
# =============================================================================

upstream backend_upstream {
    server backend:8000;
}

upstream frontend_upstream {
    server frontend:80;
}

upstream claimguard_upstream {
    server claimguard-dash:5173;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # --- Common proxy headers ---
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # --- WebSocket support (for Vite HMR) ---
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # -----------------------------------------------------------------
    # openIMIS Backend API
    # -----------------------------------------------------------------
    location /api/ {
        proxy_pass http://backend_upstream;
    }

    location /graphql {
        proxy_pass http://backend_upstream;
    }

    # Also proxy Django admin and static assets served by backend
    location /admin/ {
        proxy_pass http://backend_upstream;
    }

    location /static/admin/ {
        proxy_pass http://backend_upstream;
    }

    # -----------------------------------------------------------------
    # ClaimGuard Dashboard
    # -----------------------------------------------------------------
    location /claimguard/ {
        proxy_pass http://claimguard_upstream/;
    }

    # Vite HMR websocket for ClaimGuard dev server
    location /claimguard/__vite_hmr {
        proxy_pass http://claimguard_upstream/__vite_hmr;
        proxy_read_timeout 86400;
    }

    # -----------------------------------------------------------------
    # openIMIS React Frontend (default / catch-all)
    # -----------------------------------------------------------------
    location / {
        proxy_pass http://frontend_upstream;
    }
}
